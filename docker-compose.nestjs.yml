version: '3.9'
services:
  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile
    env_file:
      - .env
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    command: npm run dev -- --host
    depends_on:
      - backend

  backend:
    build:
      context: ./backend_nestjs
      dockerfile: Dockerfile
    env_file:
      - .env
      - backend_nestjs/.env
    volumes:
      - ./backend_nestjs/src:/app/src
      - ./backend_nestjs/package.json:/app/package.json
      - ./backend_nestjs/tsconfig.json:/app/tsconfig.json
      - ./backend_nestjs/prisma:/app/prisma
      - /app/node_modules
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
    command: sh -c "npx prisma generate && npm run dev"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
